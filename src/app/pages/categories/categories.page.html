<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tasks"></ion-back-button>
    </ion-buttons>
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="addCategory()">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-list *ngIf="(categories$ | async)?.length" lines="none" class="category-list">
    <ion-item-sliding *ngFor="let cat of categories$ | async; trackBy: trackById" #slidingItem>
      <ion-item class="category-item" detail="false" button (click)="editCategory(cat); slidingItem.close()">

        <div slot="start" class="color-badge" [style.--cat-color]="cat.color || '#8e8e93'">
          <ion-icon *ngIf="cat.icon; else dotOnly" [name]="cat.icon" class="badge-icon"></ion-icon>
          <ng-template #dotOnly>
            <span class="badge-dot"></span>
          </ng-template>
        </div>

        <ion-label class="category-label">
          {{ cat.name }}
        </ion-label>

        <ion-icon name="chevron-forward" slot="end" class="chevron-hint" aria-hidden="true"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option class="option-delete" color="danger" (click)="deleteCategory(cat); slidingItem.close()">
          <ion-icon name="trash-outline" slot="top"></ion-icon>
          Eliminar
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">categories</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>

<!-- MODAL: Crear / Editar Categoría -->
<ion-modal #categoryModal [breakpoints]="[0, 0.65, 1]" [initialBreakpoint]="0.65">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ modalTitle }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="categoryModal.dismiss()">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding modal-content">

      <ion-item lines="full" class="form-item">
        <ion-label position="stacked">Nombre <span class="required">*</span></ion-label>
        <ion-input [(ngModel)]="formName" placeholder="Nombre de la categoría" clearInput>
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="form-item">
        <ion-label position="stacked" style="margin-bottom: 8px;">Ícono</ion-label>
        <div class="icon-picker-container">
          <ion-button class="icon-button" *ngFor="let icon of availableIcons" fill="clear" (click)="formIcon = icon">
            <ion-icon slot="icon-only" [name]="icon" [color]="formIcon === icon ? 'primary' : 'medium'"
              style="font-size: 24px; transition: 0.2s;"
              [style.transform]="formIcon === icon ? 'scale(1.2)' : 'scale(1)'">
            </ion-icon>
          </ion-button>
        </div>
      </ion-item>

      <ion-item lines="none" class="form-item">
        <ion-label position="stacked" style="margin-bottom: 8px;">Color</ion-label>
        <div class="color-picker-container">
          <ion-button *ngFor="let c of colors" shape="round" [class.selected]="formColor === c" [color]="c"
            (click)="formColor = c">
            <ion-icon name="checkmark-outline" style="font-size: 22px; transition: 0.2s;"
              [style.transform]="formColor === c ? 'scale(1.3)' : 'scale(1)'"></ion-icon>
          </ion-button>
        </div>
      </ion-item>

      <ion-button expand="block" class="save-btn" [disabled]="!formName.trim()" (click)="saveCategory()">
        <ion-icon name="{{ editingCategory ? 'save-outline' : 'add-circle-outline' }}" slot="start"></ion-icon>
        {{ editingCategory ? 'Guardar cambios' : 'Crear categoría' }}
      </ion-button>

    </ion-content>
  </ng-template>
</ion-modal>

<!-- MODAL: Confirmar eliminación -->
<ion-modal #deleteModal [breakpoints]="[0, 0.35]" [initialBreakpoint]="0.35">
  <ng-template>
    <ion-content class="ion-padding delete-modal">
      <div class="delete-icon">
        <ion-icon name="trash-outline" color="danger"></ion-icon>
      </div>
      <h2>Eliminar categoría</h2>
      <p *ngIf="categoryToDelete">
        ¿Eliminar "<strong>{{ categoryToDelete.name }}</strong>"?
        Las tareas asociadas perderán esta categoría.
      </p>
      <div class="delete-actions">
        <ion-button expand="block" color="danger" (click)="confirmDelete()">
          <ion-icon name="trash-outline" slot="start"></ion-icon>
          Eliminar
        </ion-button>
        <ion-button expand="block" fill="outline" (click)="deleteModal.dismiss()">
          Cancelar
        </ion-button>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
